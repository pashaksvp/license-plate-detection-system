# =========================================================
# dataset.yaml — конфигурация датасета для YOLOv8
# =========================================================
# Этот файл описывает ваш датасет для обучения YOLO.
# Замените пути на реальные после разметки данных.

# Корневая директория датасета
path: data

# Относительные пути к изображениям
train: images/train    # ~80% данных
val: images/val        # ~20% данных

# Количество классов объектов
nc: 1

# Названия классов (индекс 0 = license_plate)
names:
  0: license_plate

# =========================================================
# КАК СОЗДАТЬ ДАТАСЕТ С НУЛЯ:
# =========================================================
#
# Шаг 1: Сбор видео
#   - Запишите видео с автомобилями на телефон или скачайте
#     публичные записи дорожных камер
#   - Рекомендуется: 15-30 минут видео = ~1000-3000 кадров
#
# Шаг 2: Извлечение кадров из видео
#   ffmpeg -i your_video.mp4 -vf fps=2 data/images/raw/frame_%04d.jpg
#   (fps=2 = 2 кадра в секунду — достаточно для датасета)
#
# Шаг 3: Разметка в Roboflow (бесплатно для небольших датасетов)
#   1. Зайдите на roboflow.com и создайте проект "Object Detection"
#   2. Загрузите кадры
#   3. Обведите номерные знаки прямоугольниками (bounding boxes)
#   4. Укажите класс "license_plate"
#   5. Экспортируйте в формате "YOLOv8"
#   6. Распакуйте в папку data/
#
# Шаг 4: Структура после экспорта должна быть:
#   data/
#   ├── dataset.yaml          (этот файл)
#   ├── images/
#   │   ├── train/            (изображения для обучения)
#   │   │   ├── frame_0001.jpg
#   │   │   └── ...
#   │   └── val/              (изображения для валидации)
#   │       └── ...
#   └── labels/
#       ├── train/            (разметка в YOLO-формате)
#       │   ├── frame_0001.txt
#       │   └── ...
#       └── val/
#           └── ...
#
# Формат файла разметки (frame_0001.txt):
#   <class_id> <x_center> <y_center> <width> <height>
#   Все значения нормированы от 0 до 1:
#   0 0.523 0.712 0.156 0.043
#   (class=0, центр x=52.3%, центр y=71.2%, ширина=15.6%, высота=4.3%)
